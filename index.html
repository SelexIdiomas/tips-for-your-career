<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Career Tips</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab') center/cover no-repeat fixed;
}

.overlay {
  background: rgba(255,255,255,0.92);
  min-height: 100vh;
  padding: 60px 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 40px;
  font-size: 36px;
}

/* accordion */
.accordion {
  background: #ffffff;
  border-radius: 12px;
  margin-bottom: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.accordion-header {
  padding: 18px 20px;
  cursor: pointer;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
}

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  padding: 0 20px;
}

.active .accordion-content {
  max-height: 500px;
  padding-bottom: 15px;
}

.number {
  color: #ec4899;
  margin-right: 10px;
}

/* buttons */
.btn {
  display: block;
  margin: 40px auto 0;
  padding: 12px 24px;
  border: none;
  background: #10b981;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.btn:hover {
  background: #059669;
}

/* hidden sections */
.hidden {
  display: none;
}

/* quiz */
.question {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.option {
  display: block;
  margin: 10px 0;
  cursor: pointer;
}

.feedback {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="container">

    <!-- PAGE 1 -->
    <div id="page1">

      <h1>10 Tips for your career</h1>

      <div class="accordion">
        <div class="accordion-header"><span><span class="number">1.</span>Get to know yourself</span><span>+</span></div>
        <div class="accordion-content"><p>Think about what you enjoy and why.</p></div>
      </div>

      <div class="accordion">
        <div class="accordion-header"><span><span class="number">2.</span>Brainstorm</span><span>+</span></div>
        <div class="accordion-content"><p>Write creative ideas with others.</p></div>
      </div>

      <div class="accordion">
        <div class="accordion-header"><span><span class="number">3.</span>Explore</span><span>+</span></div>
        <div class="accordion-content"><p>Ask people and learn from them.</p></div>
      </div>

      <button class="btn" onclick="goToPage2()">Next →</button>

    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="hidden">

      <h1>Quick Review</h1>

      <div class="question">
        <p><strong>1. What should you do first?</strong></p>

        <label class="option">
          <input type="radio" name="q1" value="wrong"> Make a plan
        </label>

        <label class="option">
          <input type="radio" name="q1" value="correct"> Get to know yourself
        </label>

        <label class="option">
          <input type="radio" name="q1" value="wrong"> Act immediately
        </label>

        <div class="feedback" id="feedback1"></div>
      </div>

      <button class="btn" onclick="checkAnswers()">Check answers</button>
      <button class="btn" onclick="goToPage1()">← Back</button>

    </div>

  </div>
</div>

<script>
/* accordion */
const items = document.querySelectorAll(".accordion");
items.forEach(item => {
  item.querySelector(".accordion-header").addEventListener("click", () => {
    item.classList.toggle("active");
  });
});

/* navigation */
function goToPage2() {
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}

function goToPage1() {
  document.getElementById("page2").classList.add("hidden");
  document.getElementById("page1").classList.remove("hidden");
}

/* quiz logic */
function checkAnswers() {
  const answer = document.querySelector('input[name="q1"]:checked');
  const feedback = document.getElementById("feedback1");

  if (!answer) {
    feedback.textContent = "Please select an answer.";
    return;
  }

  if (answer.value === "correct") {
    feedback.textContent = "Correct!";
    feedback.style.color = "green";
  } else {
    feedback.textContent = "Try again.";
    feedback.style.color = "red";
  }
}
</script>

</body>
</html>
