<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Career Tips</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab') center/cover no-repeat fixed;
}

.overlay {
  background: rgba(255,255,255,0.92);
  min-height: 100vh;
  padding: 60px 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 40px;
}

/* accordion */
.accordion {
  background: #fff;
  border-radius: 12px;
  margin-bottom: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.accordion-header {
  padding: 18px 20px;
  cursor: pointer;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
}

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: 0.3s;
  padding: 0 20px;
}

.active .accordion-content {
  max-height: 500px;
  padding-bottom: 15px;
}

.number {
  color: #ec4899;
  margin-right: 10px;
}

/* buttons */
.btn {
  display: block;
  margin: 40px auto 0;
  padding: 12px 24px;
  border: none;
  background: #10b981;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.btn:disabled {
  background: gray;
  cursor: not-allowed;
}

.hidden {
  display: none;
}

/* quiz */
.question {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.result {
  text-align: center;
  font-size: 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<!-- PAGE 1 -->
<div id="page1">

<h1>10 Tips for your career</h1>

<div id="tips-container"></div>

<button id="nextBtn" class="btn" disabled>Next →</button>

</div>

<!-- PAGE 2 -->
<div id="page2" class="hidden">

<h1>Review</h1>

<div id="quiz"></div>

<button class="btn" onclick="checkAnswers()">Check answers</button>
<div class="result" id="result"></div>
<button class="btn" onclick="goBack()">← Back</button>

</div>

</div>
</div>

<script>
const tips = [
"Before you start off in pursuit of a career that really lights your fire, take some time to do some serious self-exploration. Make a list of all the things in your life that you have really enjoyed.",
"Once you have a picture of the things that light your fire, brainstorm ways you could incorporate them into your life.",
"Ask, ask, ask! Identify people who are knowledgeable in those areas and contact them.",
"Look for small steps you can take that will bring your passion into your life.",
"Make a list of what is stopping you. Recognizing them is the first step.",
"Surround yourself with supportive people who inspire you.",
"Think about what success means to you and see failure as a learning opportunity.",
"Create a plan that organizes your ideas.",
"Don’t wait. Take action now.",
"Commit to your goal by writing it down and saying it out loud."
];

let opened = new Set();
const container = document.getElementById("tips-container");

tips.forEach((text, i) => {
  const div = document.createElement("div");
  div.className = "accordion";

  div.innerHTML = `
    <div class="accordion-header">
      <span><span class="number">${i+1}.</span>Tip ${i+1}</span>
      <span>+</span>
    </div>
    <div class="accordion-content">
      <p>${text}</p>
    </div>
  `;

  div.querySelector(".accordion-header").addEventListener("click", () => {
    div.classList.toggle("active");
    opened.add(i);

    if (opened.size === tips.length) {
      document.getElementById("nextBtn").disabled = false;
    }
  });

  container.appendChild(div);
});

/* navigation */
document.getElementById("nextBtn").onclick = () => {
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
};

/* quiz */
const questions = [
{
q: "What is the first step?",
options: ["Make a plan","Get to know yourself","Take action"],
correct: 1
},
{
q: "What should you do after identifying your interests?",
options: ["Quit your job","Brainstorm ideas","Ignore them"],
correct: 1
},
{
q: "What does 'explore' mean?",
options: ["Ask people","Stay alone","Wait"],
correct: 0
},
{
q: "How should you see failure?",
options: ["As the end","As learning","As useless"],
correct: 1
},
{
q: "What should you do today?",
options: ["Wait","Act","Complain"],
correct: 1
}
];

const quizDiv = document.getElementById("quiz");

questions.forEach((q, i) => {
  const div = document.createElement("div");
  div.className = "question";

  div.innerHTML = `<p><strong>${i+1}. ${q.q}</strong></p>` +
    q.options.map((opt, j) =>
      `<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`
    ).join("");

  quizDiv.appendChild(div);
});

function checkAnswers() {
  let score = 0;

  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected && Number(selected.value) === q.correct) {
      score++;
    }
  });

  document.getElementById("result").textContent =
    `You got ${score} / ${questions.length} correct`;
}

function goBack() {
  document.getElementById("page2").classList.add("hidden");
  document.getElementById("page1").classList.remove("hidden");
}
</script>

</body>
</html>
